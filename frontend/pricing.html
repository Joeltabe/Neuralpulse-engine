<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing — NeuralPulse Engine</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .pricing-page { max-width: 1000px; margin: 0 auto; padding: 40px 24px; position: relative; z-index: 1; }
        .pricing-page h1 { text-align: center; font-size: 36px; margin-bottom: 8px; background: linear-gradient(135deg, var(--text-primary), var(--accent-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .pricing-page .subtitle { text-align: center; color: var(--text-secondary); font-size: 16px; margin-bottom: 40px; }
        .pricing-page .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 40px; perspective: 1200px; }
        .pricing-page .pricing-card {
            background: rgba(16, 16, 40, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 36px 28px;
            text-align: center;
            transition: var(--transition);
            position: relative;
            transform-style: preserve-3d;
            box-shadow: var(--shadow-glass);
        }
        .pricing-page .pricing-card.popular { border-color: var(--accent-cyan); box-shadow: var(--shadow-card), 0 0 50px rgba(0, 212, 255, 0.15); }
        .pricing-page .pricing-card.popular::before {
            content: 'Most Popular'; position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); color: white;
            padding: 4px 18px; border-radius: 12px; font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        .pricing-page .pricing-card:hover { border-color: var(--glass-border-hover); transform: translateY(-8px) scale(1.02); box-shadow: var(--shadow-card), var(--neon-glow-strong); }
        .pricing-page .pkg-name { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .pricing-page .pkg-price { font-size: 46px; font-weight: 800; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
        .pricing-page .pkg-tokens { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; }
        .pricing-page .pkg-desc { font-size: 14px; color: var(--text-secondary); margin-bottom: 16px; }
        .pricing-page .pkg-detail { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
        .pricing-page .btn { width: 100%; padding: 12px; font-size: 15px; border-radius: 10px; }

        .token-costs { max-width: 500px; margin: 0 auto 40px; }
        .token-costs h3 { text-align: center; font-size: 18px; margin-bottom: 16px; color: var(--text-secondary); }
        .cost-row { display: flex; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--glass-border); font-size: 14px; transition: var(--transition); }
        .cost-row:hover { background: rgba(0, 212, 255, 0.03); }
        .cost-row .label { color: var(--text-secondary); }
        .cost-row .value { background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }

        .back-link { display: block; text-align: center; margin-top: 24px; color: var(--text-muted); text-decoration: none; font-size: 14px; transition: var(--transition); }
        .back-link:hover { color: var(--accent-cyan); }

        @media (max-width: 768px) {
            .pricing-page .pricing-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="pricing-page">
        <div class="nav-brand" style="justify-content:center;margin-bottom:32px">
            <a href="/" style="text-decoration:none;display:flex;align-items:center;gap:10px">
                <span class="brand-icon">&#9900;</span>
                <span class="brand-text">NeuralPulse</span>
            </a>
        </div>

        <h1>Token Packages</h1>
        <p class="subtitle">Choose the bundle that fits your workflow. Tokens never expire.</p>

        <div class="pricing-grid" id="pricingGrid">
            <div class="pricing-card"><div class="pkg-name">Loading...</div></div>
        </div>

        <div class="token-costs">
            <h3>Analysis Token Costs</h3>
            <div class="cost-row"><span class="label">Video Ad Analysis</span><span class="value">50 tokens</span></div>
            <div class="cost-row"><span class="label">Audio Ad Analysis</span><span class="value">30 tokens</span></div>
            <div class="cost-row"><span class="label">Text/Copy Analysis</span><span class="value">10 tokens</span></div>
            <div class="cost-row"><span class="label">Neural Copywriting</span><span class="value">10 tokens</span></div>
            <div class="cost-row"><span class="label">A/B Test Comparison</span><span class="value">25 tokens</span></div>
        </div>

        <a href="/app/dashboard.html" class="back-link">&larr; Back to Dashboard</a>
    </div>

    <script>
        const token = localStorage.getItem('neuralpulse_token');

        async function loadPackages() {
            try {
                const res = await fetch(window.location.origin + '/billing/packages');
                const data = await res.json();
                if (data.success && data.packages) {
                    const grid = document.getElementById('pricingGrid');
                    grid.innerHTML = data.packages.map(p => {
                        const isPopular = p.popular;
                        return `
                            <div class="pricing-card ${isPopular ? 'popular' : ''}">
                                <div class="pkg-name">${p.name}</div>
                                <div class="pkg-price">${p.price_display}</div>
                                <div class="pkg-tokens">${p.tokens.toLocaleString()} Tokens</div>
                                <p class="pkg-desc">${p.description || ''}</p>
                                <p class="pkg-detail">$${(p.price_cents / 100).toFixed(2)} per ${p.tokens} tokens</p>
                                <p class="pkg-detail">${(p.tokens / (p.price_cents / 100)).toFixed(0)} tokens per dollar</p>
                                <button class="btn ${isPopular ? 'btn-primary' : 'btn-outline'}" onclick="purchase(${p.id})">
                                    ${token ? 'Buy Now' : 'Sign In to Purchase'}
                                </button>
                            </div>
                        `;
                    }).join('');
                }
            } catch (e) {
                document.getElementById('pricingGrid').innerHTML = '<p style="text-align:center;color:var(--accent-red)">Failed to load packages</p>';
            }
        }

        async function purchase(packageId) {
            if (!token) {
                window.location.href = '/app/login.html?register=1';
                return;
            }
            try {
                const res = await fetch(window.location.origin + '/billing/purchase', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token,
                    },
                    body: JSON.stringify({ package_id: packageId }),
                });
                const data = await res.json();
                if (data.success && data.checkout_url) {
                    window.location.href = data.checkout_url;
                } else if (data.success && data.transaction) {
                    window.location.href = '/app/dashboard.html?purchased=' + data.transaction.amount;
                } else {
                    alert(data.error || 'Purchase failed');
                }
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        loadPackages();
    </script>
</body>
</html>
