upstream api {
    server api:8000;
    keepalive 256;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 500M;

    # Compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/json
        application/javascript
        application/x-javascript
        text/css
        text/plain
        text/xml
        application/xml
        text/javascript
        image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()";

    # Hide upstream
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    server_tokens off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=analysis:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # API upstream
    location / {
        limit_req zone=api burst=200 nodelay;
        limit_conn conn 50;

        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
        proxy_temp_file_write_size 64k;

        proxy_connect_timeout 15;
        proxy_send_timeout 120;
        proxy_read_timeout 120;

        # Cache successful responses
        proxy_cache api_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 1s;
        proxy_cache_valid 404 5s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_no_cache $cookie_neuralpulse_token;
        proxy_cache_bypass $cookie_neuralpulse_token;
    }

    # Auth endpoints (stricter rate limiting)
    location ~ ^/auth/(register|login|demo-login) {
        limit_req zone=auth burst=10 nodelay;
        limit_conn conn 10;

        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Analysis endpoints (limited)
    location ~ ^/analyze/ {
        limit_req zone=analysis burst=5 nodelay;
        limit_conn conn 5;
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300;
        proxy_send_timeout 300;
        client_body_timeout 300;
    }

    # Thumbnail static files
    location /thumbnails/ {
        alias /app/frontend/thumbnails/;
        expires 30d;
        add_header Cache-Control "public, immutable, must-revalidate";
        access_log off;
    }

    # Brain viz static files
    location /brain_viz/ {
        alias /app/frontend/brain_viz/;
        expires 7d;
        add_header Cache-Control "public, immutable, must-revalidate";
        access_log off;
    }

    # Uploads
    location /uploads/ {
        internal;
        alias /app/uploads/;
    }

    # Health check (no rate limit, no cache)
    location /health {
        limit_req zone=api burst=5;
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache off;
        access_log off;
    }
}
